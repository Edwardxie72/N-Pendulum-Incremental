<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Entropy Engine</title>
  <link rel="stylesheet" href="./src/index.css" />
</head>
<body>
  <div class="game-container">
    <div class="canvas-container" id="canvasContainer">
      <canvas id="trailCanvas" class="simulation-canvas"></canvas>
      <canvas id="simulation-canvas" class="simulation-canvas"></canvas>
    </div>
    
    <div class="hud-container glass-panel">
      <h1 class="title">The Entropy Engine</h1>
      <p class="subtitle">Extract energy from chaos</p>

      <div class="currency-display">
        <div class="joule-counter">
          <span id="jouleValue">0.00</span> <span style="font-size: 1.2rem; color: #fff;">Joules</span>
        </div>
        <div class="joule-rate">
          +<span id="jouleRate">0.00</span> J/s
        </div>
      </div>

      <div class="shop">
        <h2>Chaos Upgrades</h2>
        
        <div class="shop-item" id="buy-link-btn">
          <div class="item-info">
            <span class="item-name">Add Chaos Link</span>
            <span class="item-desc">Current Links: <span id="currentLinks">1</span> / 10</span>
          </div>
          <button class="btn-primary">Cost: <span id="linkCost">10</span> J</button>
        </div>
        
        <div class="shop-item" id="buy-slingshot-btn">
          <div class="item-info">
            <span class="item-name">Upgrade Slingshot Velocity</span>
            <span class="item-desc">Current Level: <span id="currentSlingshot">1</span></span>
          </div>
          <button class="btn-primary">Cost: <span id="slingshotCost">5</span> J</button>
        </div>
        
        <div class="shop-item" id="buy-motor-btn">
          <div class="item-info">
            <span class="item-name">Upgrade Auto-Motor (Min Velocity)</span>
            <span class="item-desc">Current Level: <span id="currentMotor">0</span></span>
          </div>
          <button class="btn-primary">Cost: <span id="motorCost">50</span> J</button>
        </div>
        
        <div class="shop-item" id="buy-friction-btn">
          <div class="item-info">
            <span class="item-name">Lubricate Axles (Reduce Friction)</span>
            <span class="item-desc">Current Level: <span id="currentFriction">0</span></span>
          </div>
          <button class="btn-primary">Cost: <span id="frictionCost">100</span> J</button>
        </div>
      </div>
      
      <div class="prestige-section">
        <p class="constants-counter">Universal Constants: <span id="constantsValue">0</span></p>
        <button id="heatDeathBtn" class="btn-danger" disabled>Initiate Heat Death</button>
      </div>
    </div>
  </div>

  <script type="module" src="./src/app.js"></script>
</body>
</html>
